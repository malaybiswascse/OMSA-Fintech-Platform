apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fintech-prod

resources:
  - ../../base/transaction-service.yaml
  - ../../base/policy-service.yaml
  - namespace.yaml

images:
  - name: transaction-service
    newName: ACCOUNT_ID.dkr.ecr.af-south-1.amazonaws.com/omsa/transaction-service
    newTag: latest # transaction-service
  - name: policy-service
    newName: ACCOUNT_ID.dkr.ecr.af-south-1.amazonaws.com/omsa/policy-service
    newTag: latest # policy-service

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: transaction-service
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: policy-service

commonLabels:
  environment: prod
  managed-by: argocd
