name: CI — Build · Scan · Push · Deploy

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main]

env:
  AWS_REGION:      af-south-1
  ECR_REGISTRY:    ${{ secrets.ECR_REGISTRY }}
  SONAR_HOST_URL:  ${{ secrets.SONAR_HOST_URL }}
  IMAGE_TAG:       ${{ github.run_number }}-${{ github.sha }}

jobs:

# ── Job 1: Test Transaction Service ──────────────────────────────────────────
  test-transaction-service:
    name: Test — Transaction Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       txn_test
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run unit + integration tests
        run: |
          mvn test -B \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/txn_test \
            -Dspring.datasource.username=test \
            -Dspring.datasource.password=test \
            -f services/transaction-service/pom.xml
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transaction-test-results
          path: services/transaction-service/target/surefire-reports/

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: transaction-coverage
          path: services/transaction-service/target/site/jacoco/

# ── Job 2: Test Policy Service ────────────────────────────────────────────────
  test-policy-service:
    name: Test — Policy Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       policy_test
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: |
          mvn test -B \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/policy_test \
            -Dspring.datasource.username=test \
            -Dspring.datasource.password=test \
            -f services/policy-service/pom.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-test-results
          path: services/policy-service/target/surefire-reports/

# ── Job 3: OWASP Dependency Check ─────────────────────────────────────────────
  owasp-scan:
    name: Security — OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: [test-transaction-service, test-policy-service]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: OWASP Dependency Check — Transaction Service
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -pl services/transaction-service \
            -DfailBuildOnCVSS=8 \
            -DsuppressionFile=dependency-check-suppressions.xml \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -B
        continue-on-error: false

      - name: OWASP Dependency Check — Policy Service
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -pl services/policy-service \
            -DfailBuildOnCVSS=8 \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -B
        continue-on-error: false

      - name: Upload OWASP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-reports
          path: '**/dependency-check-report.html'

# ── Job 4: SonarQube Analysis ─────────────────────────────────────────────────
  sonarqube:
    name: Code Quality — SonarQube
    runs-on: ubuntu-latest
    needs: [test-transaction-service, test-policy-service]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for better blame analysis

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: SonarQube — Transaction Service
        run: |
          mvn sonar:sonar \
            -pl services/transaction-service \
            -Dsonar.projectKey=omsa-transaction-service \
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.exclusions="**/config/**,**/dto/**,**/exception/**,**/model/**" \
            -Dsonar.qualitygate.wait=true \
            -B

      - name: SonarQube — Policy Service
        run: |
          mvn sonar:sonar \
            -pl services/policy-service \
            -Dsonar.projectKey=omsa-policy-service \
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true \
            -B

# ── Job 5: Build & Push Docker Images ─────────────────────────────────────────
  build-and-push:
    name: Build · Trivy Scan · Push to ECR
    runs-on: ubuntu-latest
    needs: [owasp-scan, sonarqube]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')

    strategy:
      matrix:
        service: [transaction-service, policy-service]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context:    services/${{ matrix.service }}
          file:       services/${{ matrix.service }}/Dockerfile
          push:       false
          load:       true
          tags:       ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ env.IMAGE_TAG }}

      - name: Trivy — container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format:       sarif
          output:       trivy-${{ matrix.service }}.sarif
          severity:     CRITICAL,HIGH
          exit-code:    1        # Fail build on CRITICAL or HIGH CVEs
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

      - name: Push image to ECR (only if Trivy passed)
        uses: docker/build-push-action@v5
        with:
          context:    services/${{ matrix.service }}
          file:       services/${{ matrix.service }}/Dockerfile
          push:       true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=gha

      - name: Scan pushed ECR image
        run: |
          aws ecr start-image-scan \
            --repository-name ${{ matrix.service }} \
            --image-id imageTag=${{ env.IMAGE_TAG }} \
            --region ${{ env.AWS_REGION }} || true

# ── Job 6: Update Kubernetes manifests (GitOps) ───────────────────────────────
  update-manifests:
    name: GitOps — Update Image Tag
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in Kustomize overlays
        run: |
          cd kubernetes/overlays/prod

          # Update transaction-service image tag
          kustomize edit set image \
            transaction-service=${{ env.ECR_REGISTRY }}/transaction-service:${{ env.IMAGE_TAG }}

          # Update policy-service image tag
          kustomize edit set image \
            policy-service=${{ env.ECR_REGISTRY }}/policy-service:${{ env.IMAGE_TAG }}

      - name: Commit and push manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/overlays/prod/kustomization.yaml
          git commit -m "chore(gitops): update image tags to ${{ env.IMAGE_TAG }} [skip ci]" \
            || echo "No changes to commit"
          git push

# ── Job 7: Notify ─────────────────────────────────────────────────────────────
  notify:
    name: Notify — Slack
    runs-on: ubuntu-latest
    needs: [build-and-push, update-manifests]
    if: always()

    steps:
      - name: Slack notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR:   ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: |
            *${{ github.workflow }}* ${{ job.status == 'success' && '✅ PASSED' || '❌ FAILED' }}
            Branch: `${{ github.ref_name }}`
            Image Tag: `${{ env.IMAGE_TAG }}`
            Commit: `${{ github.sha }}`
            Author: ${{ github.actor }}
